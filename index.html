<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windows 11 OS Experience</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/desktop.css">
  <link rel="stylesheet" href="./css/windows.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/apps.css">
  <script type="module" src="./js/main.js?v=20260528"></script>
</head>
<body>
  <div class="desktop-shell" id="desktopShell" aria-label="Windows 11 artige Desktop Oberfläche">
    <a class="sr-only" href="#mainWindows">Zum Inhalt springen</a>

    <div class="desktop-icons" aria-label="Desktop Icons">
      <button class="desktop-icon" data-open="explorer" aria-label="Datei Explorer öffnen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7.5h6l1.4 1.8H21v7.2A2.5 2.5 0 0 1 18.5 19H5.5A2.5 2.5 0 0 1 3 16.5z"/><path d="M3 7.5V6A2 2 0 0 1 5 4h4l2 2h8a2 2 0 0 1 2 2v1.3"/></svg>
        <span>Datei-Explorer</span>
      </button>
      <button class="desktop-icon" data-open="browser" aria-label="Browser öffnen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3.5 9h17"/><path d="M12 3a15 15 0 0 1 4 9 15 15 0 0 1-4 9 15 15 0 0 1-4-9 15 15 0 0 1 4-9z"/></svg>
        <span>Edge</span>
      </button>
      <button class="desktop-icon" data-open="paint" aria-label="Paint öffnen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20h16"/><path d="M7 17 15 5l2 2-8 12H7z"/><path d="M16 6 18 4"/></svg>
        <span>Paint</span>
      </button>
      <button class="desktop-icon" data-open="games" aria-label="Spiele öffnen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="4"/><path d="M8 12h8M12 8v8"/><path d="M8 8l-2 2M16 16l2-2"/></svg>
        <span>Spiele</span>
      </button>
      <button class="desktop-icon" data-open="recycle" aria-label="Papierkorb öffnen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16"/><path d="M9 3h6l1 2H8z"/><path d="M7 7l1 12a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2l1-12"/></svg>
        <span>Papierkorb</span>
      </button>
    </div>

    <div class="selection-layer" id="selectionLayer"><div class="selection-box" id="selectionBox"></div></div>
    <div class="snap-overlay" id="snapOverlay">
      <div class="snap-zone left"></div><div class="snap-zone right"></div><div class="snap-zone top"></div><div class="snap-zone max"></div>
    </div>

    <main class="window-area" id="mainWindows" aria-live="polite"></main>

    <section class="panel start-menu" id="startMenu" aria-label="Startmenü">
      <div class="searchbox"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input type="text" value="Nach Apps, Einstellungen und Dateien suchen" aria-label="Suche" readonly></div>
      <div class="start-header"><h2 class="panel-title">Angepinnt</h2><button class="toolbar-btn" data-action="all-apps">Alle Apps</button></div>
      <div class="pinned-grid" id="pinnedApps"></div>
      <div class="recommendations">
        <div class="start-header"><h3 class="panel-title panel-title-small">Empfohlen</h3><button class="toolbar-btn" data-action="more-recs">Mehr</button></div>
        <div class="rec-row">
          <button class="rec-card" data-open="paint"><div class="app-icon">🖌️</div><div><strong>Paint</strong><p>Skizzen, Formen und schnelle Bearbeitung</p></div></button>
          <button class="rec-card" data-open="notes"><div class="app-icon">📝</div><div><strong>Notizen</strong><p>Zuletzt bearbeitet · Heute</p></div></button>
          <button class="rec-card" data-open="games"><div class="app-icon">🎮</div><div><strong>Spiele</strong><p>Memory Blitz und Click Rush</p></div></button>
        </div>
      </div>
    </section>

    <section class="panel quick-panel" id="quickPanel" aria-label="Schnelleinstellungen">
      <div class="panel-header"><h2 class="panel-title">Schnelleinstellungen</h2><button class="toolbar-btn" data-open="settings">Alle Einstellungen</button></div>
      <div class="quick-grid" id="quickGrid"></div>
      <div class="panel-slider"><label>Helligkeit</label><input type="range" min="25" max="100" value="82" id="brightnessRange"></div>
      <div class="panel-slider"><label>Lautstärke</label><input type="range" min="0" max="100" value="36"></div>
      <div class="quick-footer">
        <div class="weather-card widget"><h3>Wetter</h3><p class="metric-value">18°</p><p class="muted">Dülmen · Leicht bewölkt</p></div>
        <div class="weather-card widget"><h3>Akku</h3><p class="metric-value">91%</p><p class="muted">Geschätzte Laufzeit: 6h 12m</p></div>
      </div>
    </section>

    <section class="panel notif-panel" id="notifPanel" aria-label="Benachrichtigungen und Kalender">
      <div class="panel-header"><h2 class="panel-title">Benachrichtigungen</h2><button class="toolbar-btn" id="clearNotifs">Alle löschen</button></div>
      <div class="notif-stack" id="notifStack"></div>
    </section>

    <nav class="taskbar" aria-label="Taskleiste">
      <div class="taskbar-side left"></div>
      <div class="taskbar-center" id="taskbarCenter">
        <button class="taskbar-button start-logo active" id="startButton" aria-label="Start öffnen">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 4.6 10.5 3v8.3H3zm8.6-1.8L21 1v10.3h-9.4zM3 13.1h7.5v8.2L3 19.8zm8.6 0H21V23l-9.4-1.7z"/></svg>
        </button>
      </div>
      <div class="taskbar-side right">
        <div class="system-tray">
          <button class="tray-btn" id="quickButton" aria-label="Schnelleinstellungen öffnen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12a7 7 0 0 1 12.1-4.95"/><path d="M19 12a7 7 0 0 1-12.1 4.95"/><path d="M19 4v4h-4"/><path d="M5 20v-4h4"/></svg>
          </button>
          <button class="tray-btn" id="notifButton" aria-label="Benachrichtigungen öffnen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 8a6 6 0 1 1 12 0c0 7 3 7 3 9H3c0-2 3-2 3-9"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>
          </button>
          <div class="clock-stack" id="clockStack"></div>
        </div>
      </div>
    </nav>

    <div class="context-menu" id="contextMenu" aria-label="Kontextmenü">
      <button class="context-item" data-context="refresh">Aktualisieren <span>F5</span></button>
      <button class="context-item" data-context="new-note">Neue Notiz <span>Ctrl+Alt+N</span></button>
      <button class="context-item" data-context="new-folder">Neuer Ordner <span></span></button>
      <div class="context-sep"></div>
      <button class="context-item" data-context="toggle-theme">Hell/Dunkel umschalten <span></span></button>
      <button class="context-item" data-context="wallpaper">Wallpaper wechseln <span></span></button>
    </div>

    <div class="toast-stack" id="toastStack"></div>
  </div>

  <template id="windowTemplate">
    <section class="window" role="dialog" aria-modal="false">
      <div class="window-header">
        <div class="window-titlebar">
          <div class="window-icon"></div>
          <div class="window-title-group"><div class="window-title"></div><div class="window-subtitle"></div></div>
        </div>
        <div class="window-controls">
          <button class="title-btn" data-win="minimize" aria-label="Minimieren">—</button>
          <button class="title-btn" data-win="maximize" aria-label="Maximieren">▢</button>
          <button class="title-btn close" data-win="close" aria-label="Schließen">✕</button>
        </div>
      </div>
      <div class="window-content"></div>
      <span class="resizer n"></span><span class="resizer s"></span><span class="resizer e"></span><span class="resizer w"></span><span class="resizer nw"></span><span class="resizer ne"></span><span class="resizer sw"></span><span class="resizer se"></span>
    </section>
  </template>
</body>
</html>
